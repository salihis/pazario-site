<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Gönderim - Pazar.io</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-2xl font-black text-emerald-600">Pazar.io</div>
        <div class="space-x-8 font-semibold text-slate-600">
            <a href="index.html" class="hover:text-emerald-600 transition-colors">Ana Sayfa</a>
            <a href="urun-gonderim.html" class="text-emerald-600">Ürün Gönderim</a>
            <a href="admin.html" class="hover:text-emerald-600 transition-colors">Admin Panel</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 px-6 pb-20">
        <div class="bg-white p-10 rounded-3xl border border-slate-100 shadow-sm">
            <h1 class="text-3xl font-black mb-2">Ürün Yayınla</h1>
            <p class="text-slate-500 mb-8">Ürün bilgilerinizi girerek tüm pazaryerlerine tek seferde gönderin.</p>

            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Ürün Adı</label>
                        <input type="text" placeholder="Örn: iPhone 15 Pro" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">SKU / Stok Kodu</label>
                        <input type="text" placeholder="Örn: IP15-PRO-256" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Ürün Açıklaması</label>
                    <textarea rows="4" placeholder="Ürün detaylarını buraya yazın..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Fiyat (₺)</label>
                        <input type="number" placeholder="0.00" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Stok Adedi</label>
                        <input type="number" placeholder="0" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Kategori</label>
                        <select class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                            <option>Elektronik</option>
                            <option>Ev & Yaşam</option>
                            <option>Giyim</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6 border-t border-slate-100">
                    <h3 class="text-sm font-bold text-slate-700 mb-4">Gönderilecek Pazaryerleri</h3>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-xl cursor-pointer hover:bg-emerald-50 transition-all border border-transparent hover:border-emerald-200">
                            <input type="checkbox" checked class="w-4 h-4 text-emerald-600 rounded">
                            <span class="text-sm font-semibold">Trendyol</span>
                        </label>
                        <label class="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-xl cursor-pointer hover:bg-emerald-50 transition-all border border-transparent hover:border-emerald-200">
                            <input type="checkbox" checked class="w-4 h-4 text-emerald-600 rounded">
                            <span class="text-sm font-semibold">Hepsiburada</span>
                        </label>
                        <label class="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-xl cursor-pointer hover:bg-emerald-50 transition-all border border-transparent hover:border-emerald-200">
                            <input type="checkbox" class="w-4 h-4 text-emerald-600 rounded">
                            <span class="text-sm font-semibold">N11</span>
                        </label>
                    </div>
                </div>

                <button type="button" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-500/20 mt-6">
                    Ürünü Yayınla
                </button>
            </form>
        </div>
    </main>

    <footer class="p-10 text-center text-slate-400 border-t border-slate-100">
        &copy; 2026 Pazar.io - Tüm Hakları Saklıdır.
    </footer>
</body>
</html>
